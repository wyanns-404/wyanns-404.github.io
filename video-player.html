<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link rel="stylesheet" href="src/style/video-player.css">
    
  </head>
  <body>
    <!-- LANDSCAPE HINT -->
    <div id="landscape-hint" style="cursor: pointer;">
      <svg
        width="56"
        height="56"
        viewBox="0 0 24 24"
        fill="none"
        stroke="white"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <rect x="2" y="7" width="20" height="14" rx="2" />
        <path d="M12 3v4M8 3l4 4 4-4" />
      </svg>
      <p>Click disini untuk fullscreen</p>
    </div>

    <!-- PLAYER -->
    <div id="player" class="show-cursor">
      <video
        id="vid"
        src="src/assets/videos/video-1.mov"
        preload="auto"
      ></video>

      <div class="tap-ring" id="ring-l"></div>
      <div class="tap-ring" id="ring-r"></div>
      <div id="click-zone"></div>

      <!-- PP RIPPLE -->
      <div id="pp-ripple">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z" /></svg>
      </div>

      <!-- BUFFERING -->
      <div id="spinner">
        <svg viewBox="0 0 50 50" fill="none" stroke="white" stroke-width="4">
          <circle
            cx="25"
            cy="25"
            r="20"
            stroke-dasharray="80 40"
            stroke-linecap="round"
          />
        </svg>
      </div>

      <!-- UI OVERLAY -->
      <div id="ui-overlay">
        <div id="top-bar">
          <button id="btn-back" aria-label="Kembali">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="15 18 9 12 15 6" />
            </svg>
          </button>
        </div>

        <div id="bottom-bar">
          <div id="progress-wrap" role="slider" aria-label="Seek" tabindex="0">
            <div id="progress-track">
              <div id="progress-fill" style="width: 0%">
                <div id="progress-thumb"></div>
              </div>
            </div>
            <div id="time-display">0:00 / 0:00</div>
          </div>

          <div id="controls-row">
            <button class="ctrl-btn" id="btn-play" aria-label="Play/Pause">
              <svg id="ico-play" viewBox="0 0 24 24" fill="currentColor">
                <path d="M8 5v14l11-7z" />
              </svg>
              <svg
                id="ico-pause"
                viewBox="0 0 24 24"
                fill="currentColor"
                style="display: none"
              >
                <rect x="6" y="4" width="4" height="16" rx="1" />
                <rect x="14" y="4" width="4" height="16" rx="1" />
              </svg>
            </button>

            <button
              class="ctrl-btn small"
              id="btn-rew"
              aria-label="Mundur 10 detik"
            >
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path
                  d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"
                />
                <text
                  x="12"
                  y="14.5"
                  text-anchor="middle"
                  font-size="5.5"
                  font-weight="700"
                  fill="currentColor"
                  font-family="Arial"
                >
                  10
                </text>
              </svg>
            </button>

            <button
              class="ctrl-btn small"
              id="btn-fwd"
              aria-label="Maju 10 detik"
            >
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path
                  d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"
                />
                <text
                  x="12"
                  y="14.5"
                  text-anchor="middle"
                  font-size="5.5"
                  font-weight="700"
                  fill="currentColor"
                  font-family="Arial"
                >
                  10
                </text>
              </svg>
            </button>

            <div id="vol-wrap">
              <button class="ctrl-btn small" id="btn-vol" aria-label="Volume">
                <svg id="ico-vol" viewBox="0 0 24 24" fill="currentColor">
                  <path
                    d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"
                  />
                  <path
                    d="M14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"
                  />
                </svg>
                <svg
                  id="ico-mute"
                  viewBox="0 0 24 24"
                  fill="currentColor"
                  style="display: none"
                >
                  <path
                    d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"
                  />
                </svg>
              </button>
              <input
                type="range"
                id="vol-slider"
                min="0"
                max="100"
                value="100"
                aria-label="Volume"
              />
            </div>

            <div id="title-area">
              <!-- <div><strong>One Piece</strong> E588</div>
              <div id="title-episode">
                Meeting Again After Two Years! Luffy and Law!
              </div> -->
            </div>

            <div id="right-controls">
              <button
                class="ctrl-btn small"
                id="btn-speed"
                title="1×"
                aria-label="Kecepatan"
              >
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path
                    d="M20.38 8.57l-1.23 1.85a8 8 0 01-.22 7.58H5.07A8 8 0 0115.58 6.85l1.85-1.23A10 10 0 003.35 19a2 2 0 001.72 1h13.85a2 2 0 001.74-1 10 10 0 00-.27-10.44z"
                  />
                  <path
                    d="M10.59 15.41a2 2 0 002.83 0l5.66-8.49-8.49 5.66a2 2 0 000 2.83z"
                  />
                </svg>
              </button>
              <button
                class="ctrl-btn small"
                id="btn-fs"
                aria-label="Layar Penuh"
              >
                <svg id="ico-fs-enter" viewBox="0 0 24 24" fill="currentColor">
                  <path
                    d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"
                  />
                </svg>
                <svg
                  id="ico-fs-exit"
                  viewBox="0 0 24 24"
                  fill="currentColor"
                  style="display: none"
                >
                  <path
                    d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"
                  />
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="src/js/video-player.js"></script>
  </body>
</html>
